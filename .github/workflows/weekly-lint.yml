name: Weekly AI Lint

on:
  schedule:
    - cron: '0 2 * * 0'  # 每周日凌晨2点(UTC)
  workflow_dispatch:      # 支持手动触发

permissions:
  contents: write

jobs:
  lint-check:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v3

      - name: 设置Node.js环境
        uses: actions/setup-node@v3

      - name: 运行AI Lint检查
        run: |
          chmod +x scripts/lint.sh
          bash scripts/lint.sh

      - name: 提交更改
        run: |
          git config --global user.name "AI Linter"
          git config --global user.email "ai-linter@github-actions[bot]"
          git add .
          git diff --quiet || git commit -m "chore: 每周自动Lint检查与修复"
          git push
